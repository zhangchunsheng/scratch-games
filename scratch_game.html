function setVar(name,val){vars[name]=val;}
function isKeyDown(k){return !!keys[k.toLowerCase()];}

document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;keys[e.code.toLowerCase()]=true;

document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;keys[e.code.toLowerCase()]=false;});

canvas.addEventListener('mousedown',()=>mouseDown=true);
canvas.addEventListener('mouseup',()=>mouseDown=false);

function wait(secs){return new Promise(r=>setTimeout(r,secs*1000));}
function tick(){return new Promise(r=>requestAnimationFrame(r));}

function isTouching(sprite, target){
  if(target==='_edge_'){
    return sprite.x+sprite.w/2>W/2||sprite.x-sprite.w/2<-W/2||sprite.y+sprite.h/2>H/2||sprite.y-sprite.h/2<-H/2;
  }
  const other=sprites.find(s=>s.name===target);
  if(!other||!other.visible)return false;
  return Math.abs(sprite.x-other.x)<(sprite.w+other.w)/2&&Math.abs(sprite.y-other.y)<(sprite.h+other.h)/2;
}

class Sprite {
  constructor(def){
    Object.assign(this,{x:0,y:0,direction:90,size:100,visible:true,rotationStyle:'all around',say:null,sayTimer:0,think:null,thinkTimer:0,effects:{},w:60,h:60,...def});
    this._handlers={};
    this._images={};
    this.loadImages();
  }
  loadImages(){
    (this.costumes||[]).forEach((c,i)=>{
      if(!c.url)return;
      const img=new Image();
      img.src=c.url;
      img.onload=()=>{this._images[i]=img;};
      this._images[i]=img;
    });
  }
  on(ev,fn){if(!this._handlers[ev])this._handlers[ev]=[];this._handlers[ev].push(fn);}
  emit(ev){(this._handlers[ev]||[]).forEach(fn=>{fn.call(this);});}
  move(steps){
    const rad=(this.direction-90)*Math.PI/180;
    this.x+=Math.cos(rad)*steps;
    this.y-=Math.sin(rad)*steps;
  }
  bounceOnEdge(){
    if(this.x>W/2-this.w/2||this.x<-W/2+this.w/2)this.direction=180-this.direction;
    if(this.y>H/2-this.h/2||this.y<-H/2+this.h/2)this.direction=-this.direction;
    this.x=Math.max(-W/2+this.w/2,Math.min(W/2-this.w/2,this.x));
    this.y=Math.max(-H/2+this.h/2,Math.min(H/2-this.h/2,this.y));
  }
  switchCostume(nameOrNum){
    const idx=this.costumes.findIndex(c=>c.name===String(nameOrNum));
    if(idx>=0)this.costumeIndex=idx;
    else{const n=Number(nameOrNum)-1;if(n>=0&&n<this.costumes.length)this.costumeIndex=n;}
  }
  draw(){
    if(!this.visible)return;
    ctx.save();
    const cx=this.x+W/2, cy=H/2-this.y;
    ctx.translate(cx,cy);
    if(this.rotationStyle==='all around')ctx.rotate((this.direction-90)*Math.PI/180);
    else if(this.rotationStyle==='left-right'&&this.direction<0)ctx.scale(-1,1);
    const scale=this.size/100;
    const img=this._images[this.costumeIndex];
    if(img&&img.complete&&img.naturalWidth>0){
      const br=this.costumes[this.costumeIndex]?.bitmapResolution||1;
      const w=img.naturalWidth/br*scale, h=img.naturalHeight/br*scale;
      const rx=this.costumes[this.costumeIndex]?.rotationCenterX||img.naturalWidth/2;
      const ry=this.costumes[this.costumeIndex]?.rotationCenterY||img.naturalHeight/2;
      this.w=w;this.h=h;
      if(this.effects.ghost){ctx.globalAlpha=1-this.effects.ghost/100;}
      if(this.effects.color){ctx.filter='hue-rotate('+this.effects.color*3.6+'deg)';}
      ctx.drawImage(img,-rx/br*scale,-ry/br*scale,w,h);
    } else {
      ctx.fillStyle='#4488ff';ctx.fillRect(-20,-20,40,40);
      this.w=40;this.h=40;
    }
    ctx.restore();
    if(this.sayTimer>0){
      const bx=cx+10, by=cy-40;
      ctx.fillStyle='white';ctx.strokeStyle='#aaa';
      const tw=ctx.measureText(String(this.say)).width+16;
      ctx.beginPath();ctx.roundRect(bx,by-28,tw,28,6);ctx.fill();ctx.stroke();
      ctx.fillStyle='#222';ctx.font='13px sans-serif';ctx.fillText(String(this.say),bx+8,by-10);
      this.sayTimer--;
    }
    if(this.thinkTimer>0){this.thinkTimer--;}
  }
}

function initSprites(){
  sprites=spriteDefs.map(def=>{
    const s=new Sprite(def);
    if(def.scripts)def.scripts(s);
    return s;
  });
  const stageDef={
    name:'Stage',x:0,y:0,costumes:[{name:"说明",url:"blob:null/4bd5fcd4-2649-495f-8266-d7e08e5c76a5",bitmapResolution:1,rotationCenterX:251.5656754114999,rotationCenterY:188.674271122},{name:"背景1",url:"blob:null/f6a827c7-dd75-4ed0-b7a6-69f92777afe7",bitmapResolution:1,rotationCenterX:242.64916886227556,rotationCenterY:181.98894846802753},{name:"背景2",url:"blob:null/c499b1e4-169d-48e4-b62b-6c41a04fd081",bitmapResolution:1,rotationCenterX:300.66841676646663,rotationCenterY:180.40105005988005}],costumeIndex:1,
    isStage:true,visible:true,_handlers:{},_images:{},
    on(ev,fn){if(!this._handlers[ev])this._handlers[ev]=[];this._handlers[ev].push(fn);},
    emit(ev){(this._handlers[ev]||[]).forEach(fn=>fn.call(this));},
    loadImages(){}
  };
  const stageSprite=new Sprite(stageDef);
  (function(sprite){ sprite.on('flag', async function(){while(!((String(getVar("关卡")).toLowerCase() === String("2").toLowerCase()))){await tick();}}); })(stageSprite);
  stageObj=stageSprite;
}

async function gameLoop(){
  running=true;
  initSprites();
  sprites.forEach(s=>s.emit('flag'));
  if(stageObj)stageObj.emit('flag');
  while(running){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    if(stageObj){
      const img=stageObj._images[stageObj.costumeIndex];
      if(img&&img.complete&&img.naturalWidth>0)ctx.drawImage(img,0,0,W,H);
    }
    sprites.forEach(s=>s.draw());
    const vhtml=Object.entries(vars).map(([k,v])=>`<b>${k}</b>: ${v}`).join(' &nbsp; ');
    document.getElementById('vars').innerHTML=vhtml;
    await tick();
  }
}

document.getElementById('startBtn').onclick=()=>{if(!running)gameLoop();};
document.getElementById('stopBtn').onclick=()=>{running=false;ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);};
